<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Non-binary Pride Flag</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --color-flag-pdx-green: oklab(0.46 -0.11 0.05 / 100);
        --color-flag-pdx-white: oklab(1 0 0 / 100);
        --color-flag-pdx-blue: oklab(0.64 -0.05 -0.13 / 100);
        --color-flag-pdx-yellow: oklab(0.83 0.03 0.17 / 100);
        --dimension-flag-pdx-original-width: 600;
        --dimension-flag-pdx-original-height: 360;
        --dimension-flag-pdx-original-aspect: calc(
          var(--dimension-flag-pdx-original-width) /
            var(--dimension-flag-pdx-original-height)
        );
        --1w: calc(1vw * (100 / var(--dimension-flag-pdx-original-width)));
        --1h: calc(1vh * (100 / var(--dimension-flag-pdx-original-height)));
        --gapw: calc(10 * var(--1w));
        --gaph: calc(10 * var(--1h));
      }

      html {
        margin: 0;
        padding: 0;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
      }

      .pdx-flag {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-areas:
          "topleft topright"
          "bottomleft bottomright";
        grid-template-rows:
          calc(17.5 * var(--gaph))
          calc(18.5 * var(--gaph));
        grid-template-columns:
          calc(26 * var(--gapw))
          calc(27 * var(--gapw));
        row-gap: var(--gaph);
        column-gap: var(--gapw);

        & .topleft {
          grid-area: topleft;
          border-bottom-right-radius: calc(4 * var(--gaph));
          border-color: var(--color-flag-pdx-blue);
          border-style: solid;
          border-width: 0;
          border-right-width: calc(4 * var(--gapw));
        }
        & .topright {
          grid-area: topright;
          border-bottom-left-radius: calc(4 * var(--gapw));
          border-color: var(--color-flag-pdx-blue);
          border-style: solid;
          border-width: 0;
          border-bottom-width: calc(4 * var(--gaph));
        }
        & .bottomleft {
          grid-area: bottomleft;
          border-top-right-radius: calc(4 * var(--gapw));
          border-color: var(--color-flag-pdx-blue);
          border-style: solid;
          border-width: 0;
          border-top-width: calc(4 * var(--gaph));
        }
        & .bottomright {
          grid-area: bottomright;
          border-top-left-radius: calc(4 * var(--gaph));
          border-color: var(--color-flag-pdx-blue);
          border-style: solid;
          border-width: 0;
          border-left-width: calc(4 * var(--gapw));
        }

        background-color: var(--color-flag-pdx-white);

        & .green {
          background-color: var(--color-flag-pdx-green);
        }
        & .white {
          background-color: var(--color-flag-pdx-white);
        }
        & .blue {
          background-color: var(--color-flag-pdx-blue);
        }
        & .yellow {
          background-color: var(--color-flag-pdx-yellow);
        }
      }
    </style>
  </head>

  <body class="pdx-flag">
    <div class="topleft"></div>
    <div class="topright"></div>
    <div class="bottomleft"></div>
    <div class="bottomright"></div>
  </body>
</html>
