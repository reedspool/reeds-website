<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Web Day!</title>
    <base href="/2026/webday/" />
    <meta itemprop="nocontainer" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caladea:ital,wght@0,400;0,700;1,400;1,700&family=Hachi+Maru+Pop&family=Yarndings+20&display=block"
      rel="stylesheet"
    />
    <style>
      :root {
        --prose-font-family: "Caladea", serif;
        --fancy-font-family: "Hachi Maru Pop", cursive;

        font: 1rem/1.4 var(--prose-font-family);
        font-size: 20px;

        background-image: url(./puzzlepieces.png);
        background-color: #a1a1a1;
        filter: hue-rotate(90deg);
        --animation-prefix: 60s infinite forwards;
        animation: var(--animation-prefix) rotate-hue;
        color: #3d3d3d;
        text-wrap: pretty;
      }

      @keyframes rotate-hue {
        from {
          filter: hue-rotate(0deg);
        }
        to {
          filter: hue-rotate(360deg);
        }
      }

      @keyframes rotate-hue-reverse {
        from {
          filter: hue-rotate(0deg);
        }
        to {
          filter: hue-rotate(-360deg);
        }
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        filter: hue-rotate(-90deg);
        animation: var(--animation-prefix) rotate-hue-reverse;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: var(--fancy-font-family);
        font-optical-sizing: auto;
        font-weight: 700;
        font-style: normal;
        text-shadow: 3px 3px 2px rgb(200 158 28 / 80%);
        animation: var(--animation-prefix) rotate-hue;
      }
      h1 {
        font-size: 4.2em;
        text-align: center;
        margin-block-start: 0.4em;
        line-height: 0.6;
      }
      h2 {
        text-align: left;
        font-size: 1.6em;
      }

      a {
        color: darkblue;
        &:visited {
          color: deeppink;
        }
      }

      layout-center {
        display: block;
        margin-inline: auto;

        @media (min-width: 48ch) {
          width: max-content;
        }

        &[fill] {
          --bg: rgb(226 226 226 / 97%);
          background-color: var(--bg);
          padding-inline: 4rem;
          padding-top: 1rem;
          --blur: 2rem;
          box-shadow: 0 0 var(--blur) var(--blur) var(--bg);
          @media (min-width: 48ch) {
            max-width: 48ch;
          }
        }
      }

      .silly,
      .yarndings-20-regular {
        font-size: 0.8em;
        font-family: "Yarndings 20", system-ui;
        font-weight: 400;
        font-style: normal;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <layout-center>
      Web Day is now at <a href="https://clipdx.com/webday">this link</a> under
      the umbrella <a href="https://clipdx.com">Computers Like Portland</a>.
      Check out the next one there!
    </layout-center>
  </body>
</html>
