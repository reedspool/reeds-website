<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Personal Website Workshop</title>
    <base href="/2025/websiteworkshop/" />
    <meta itemprop="nocontainer" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caladea:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400..700&family=Yarndings+20&display=block"
      rel="stylesheet"
    />
    <style>
      :root {
        --prose-font: "Caladea", serif;
        --fancy-font: "Caveat", cursive;

        font-family: var(--prose-font);
        font-size: 20px;

        background-image: url(./brick-wall.png);
        background-color: firebrick;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: var(--fancy-font);
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
      }
      h1 {
        font-size: 2.6em;
        text-decoration: underline;
        text-align: center;
        margin-block-start: 0;
      }
      h2 {
        text-align: center;
        font-size: 1.8em;
      }

      layout-center {
        display: block;
        margin-inline: auto;

        @media (min-width: 48ch) {
          width: max-content;
        }

        &[fill] {
          --background: rgb(255 235 205 / 80%);
          background-color: var(--background);
          padding-inline: 4rem;
          padding-top: 1rem;
          --blur: 4rem;
          box-shadow: 0 0 var(--blur) var(--blur) var(--background);
          @media (min-width: 48ch) {
            max-width: 48ch;
          }
        }
      }

      .silly,
      .yarndings-20-regular {
        font-size: 0.8em;
        font-family: "Yarndings 20", system-ui;
        font-weight: 400;
        font-style: normal;
        text-align: center;
      }

      web-day-note {
        display: block;
        background-color: #1a1a1a;
        color: #e1dfdf;
        margin-block: 5em;
        background-color: rgb(26 26 26 / 81%);
        padding-inline: 4rem;
        padding-block: 1rem;
        --blur: 2rem;
        box-shadow: 0 0 var(--blur) var(--blur) rgb(26 26 26 / 83%);
        a {
          color: lightblue;
          &:visited {
            color: lightpink;
          }
        }
      }
    </style>
  </head>

  <body>
    <layout-center>
      Web Day is now at <a href="https://clipdx.com/webday">this link</a> under
      the umbrella <a href="https://clipdx.com">Computers Like Portland</a>.
      Check out the next one there!
    </layout-center>
  </body>
</html>
